<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TF ESPORTS | Neon Pro</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <style>
        :root { --neon: #39FF14; --bg: #050505; --card: #121212; }
        body { font-family: 'Orbitron', sans-serif; background-color: var(--bg); color: white; margin: 0; padding: 0; text-align: center; }
        header { background: var(--card); padding: 20px; border-bottom: 2px solid var(--neon); box-shadow: 0 0 15px var(--neon); font-size: 24px; font-weight: bold; color: var(--neon); text-transform: uppercase; }
        .container { padding: 15px; }
        .match-card { background: var(--card); border: 1px solid #333; border-radius: 15px; padding: 20px; margin-bottom: 20px; position: relative; transition: 0.3s; }
        .match-card:hover { border-color: var(--neon); box-shadow: 0 0 10px var(--neon); }
        .neon-text { color: var(--neon); text-shadow: 0 0 5px var(--neon); font-size: 1.2rem; }
        .btn { background: var(--neon); color: black; padding: 12px; border: none; border-radius: 8px; width: 100%; font-weight: bold; cursor: pointer; margin-top: 10px; text-transform: uppercase; }
        .admin-btn { background: transparent; color: #444; font-size: 10px; border: none; margin-top: 50px; }
        input { width: 90%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #333; background: #1a1a1a; color: white; outline: none; }
        input:focus { border-color: var(--neon); }
        .idp-box { background: #000; border: 1px dashed var(--neon); padding: 10px; margin-top: 10px; display: none; }
    </style>
</head>
<body>

<header>TF ESPORTS - NEON HUB</header>

<div class="container" id="main-content">
    <div id="match-list"></div>
</div>

<div id="admin-panel" style="display:none; padding: 20px;">
    <h2 class="neon-text">ADMIN CONTROL</h2>
    <input type="text" id="mName" placeholder="Match Name (e.g. Solo 9PM)">
    <input type="text" id="mFee" placeholder="Entry Fee (e.g. 10)">
    <input type="text" id="mPrize" placeholder="Prize Pool (e.g. 100)">
    <input type="text" id="mIdp" placeholder="ID & Password (Wait for Match)">
    <button class="btn" onclick="addMatch()">CREATE MATCH</button>
    <hr>
    <h3 class="neon-text">PLAYERS REGISTERED</h3>
    <div id="player-list" style="text-align: left; font-size: 12px; color: #ccc;"></div>
</div>

<button class="admin-btn" onclick="toggleAdmin()">Admin Login</button>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCZBbvexesf4yv2LYGr-H4WxDHcbp8PlkY",
        authDomain: "tf-esports-c337f.firebaseapp.com",
        projectId: "tf-esports-c337f",
        databaseURL: "https://tf-esports-c337f-default-rtdb.firebaseio.com/",
        storageBucket: "tf-esports-c337f.firebasestorage.app",
        messagingSenderId: "1035662946197",
        appId: "1:1035662946197:web:e795103f16a12c80ab509c"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // 1. Match Add Karne (Admin)
    function addMatch() {
        const name = document.getElementById('mName').value;
        const fee = document.getElementById('mFee').value;
        const prize = document.getElementById('mPrize').value;
        const idp = document.getElementById('mIdp').value;
        
        db.ref('matches').push({ name, fee, prize, idp });
        alert("Match Added!");
    }

    // 2. Matches List Display Karne
    db.ref('matches').on('value', (snap) => {
        const list = document.getElementById('match-list');
        list.innerHTML = "";
        snap.forEach((child) => {
            const m = child.val();
            list.innerHTML += `
                <div class="match-card">
                    <span class="neon-text">${m.name}</span><br>
                    <span>Entry: ₹${m.fee} | Prize: ₹${m.prize}</span>
                    <input type="text" id="ign-${child.key}" placeholder="Your IGN">
                    <input type="text" id="uid-${child.key}" placeholder="Your UID">
                    <button class="btn" onclick="joinMatch('${child.key}')">Register</button>
                    <div class="idp-box" id="idp-${child.key}">IDP: ${m.idp}</div>
                </div>
            `;
        });
    });

    // 3. Player Register Karne
    function joinMatch(matchId) {
        const ign = document.getElementById('ign-'+matchId).value;
        const uid = document.getElementById('uid-'+matchId).value;
        if(!ign || !uid) return alert("Details bhara!");

        db.ref('registrations').push({ matchId, ign, uid }).then(() => {
            alert("Registered! Match chya veli IDP ithech disel.");
            document.getElementById('idp-'+matchId).style.display = "block";
        });
    }

    // 4. Admin Panel toggle (Simple Password)
    function toggleAdmin() {
        const pass = prompt("Enter Admin Password:");
        if(pass === "tf123") { // Password badlu shakto
            document.getElementById('admin-panel').style.display = "block";
            document.getElementById('main-content').style.display = "none";
            loadPlayers();
        }
    }

    // 5. Admin sathi Players list load karne
    function loadPlayers() {
        db.ref('registrations').on('value', (snap) => {
            const pList = document.getElementById('player-list');
            pList.innerHTML = "";
            snap.forEach((child) => {
                const p = child.val();
                pList.innerHTML += `<p>Match ID: ${p.matchId} | IGN: ${p.ign} | UID: ${p.uid}</p>`;
            });
        });
    }
</script>
</body>
</html>
