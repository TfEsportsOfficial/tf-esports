<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TF ESPORTS | Players Hub</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <style>
        :root { --neon: #39FF14; --bg: #050505; --card: #121212; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); color: white; margin: 0; text-align: center; }
        header { background: var(--card); padding: 20px; border-bottom: 2px solid var(--neon); box-shadow: 0 0 15px var(--neon); color: var(--neon); font-weight: bold; text-transform: uppercase; }
        .container { padding: 15px; max-width: 500px; margin: auto; }
        .match-card { background: var(--card); border: 1px solid #333; border-radius: 15px; padding: 20px; margin-bottom: 20px; transition: 0.3s; }
        .match-card:hover { border-color: var(--neon); box-shadow: 0 0 10px var(--neon); }
        .neon-text { color: var(--neon); text-shadow: 0 0 5px var(--neon); font-size: 1.2rem; display: block; margin-bottom: 10px; }
        input { width: 90%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #333; background: #1a1a1a; color: white; outline: none; }
        .btn { background: var(--neon); color: black; padding: 12px; border: none; border-radius: 8px; width: 100%; font-weight: bold; cursor: pointer; margin-top: 10px; text-transform: uppercase; }
        .idp-box { background: #000; border: 1px dashed var(--neon); padding: 10px; margin-top: 15px; display: none; color: var(--neon); font-weight: bold; }
    </style>
</head>
<body>

<header>TF ESPORTS - PLAYER ZONE</header>

<div class="container">
    <div id="match-list">Loading Matches...</div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCZBbvexesf4yv2LYGr-H4WxDHcbp8PlkY",
        authDomain: "tf-esports-c337f.firebaseapp.com",
        projectId: "tf-esports-c337f",
        databaseURL: "https://tf-esports-c337f-default-rtdb.firebaseio.com/",
        storageBucket: "tf-esports-c337f.firebasestorage.app",
        messagingSenderId: "1035662946197",
        appId: "1:1035662946197:web:e795103f16a12c80ab509c"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    db.ref('matches').on('value', (snap) => {
        const list = document.getElementById('match-list');
        list.innerHTML = "";
        snap.forEach((child) => {
            const m = child.val();
            list.innerHTML += `
                <div class="match-card">
                    <span class="neon-text">${m.name}</span>
                    <p>Entry: ₹${m.fee} | Prize: ₹${m.prize}</p>
                    <input type="text" id="ign-${child.key}" placeholder="In-Game Name">
                    <input type="text" id="uid-${child.key}" placeholder="Game UID">
                    <button class="btn" onclick="joinMatch('${child.key}')">Register & Get IDP</button>
                    <div class="idp-box" id="idp-${child.key}">ROOM ID: ${m.idp}</div>
                </div>
            `;
        });
    });

    function joinMatch(matchId) {
        const ign = document.getElementById('ign-'+matchId).value;
        const uid = document.getElementById('uid-'+matchId).value;
        if(!ign || !uid) return alert("Details bhara bhava!");

        db.ref('registrations').push({ matchId, ign, uid, time: new Date().toLocaleString() }).then(() => {
            alert("Registration Successful!");
            document.getElementById('idp-'+matchId).style.display = "block";
        });
    }
</script>
</body>
</html>
