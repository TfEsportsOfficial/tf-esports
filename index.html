<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TF ESPORTS | Tournament Hub</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <style>
        body { font-family: 'Arial', sans-serif; background-color: #0d0d0d; color: white; text-align: center; margin: 0; padding: 0; }
        header { background: linear-gradient(to right, #ff4500, #b22222); padding: 20px; font-size: 26px; font-weight: bold; box-shadow: 0 4px 15px rgba(255, 69, 0, 0.3); }
        .card { background: #1a1a1a; margin: 20px auto; padding: 30px; border-radius: 15px; border: 1px solid #ff4500; max-width: 400px; box-shadow: 0 0 20px rgba(0,0,0,0.8); }
        h2 { color: #ff4500; text-transform: uppercase; letter-spacing: 2px; }
        input { width: 90%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #444; background: #222; color: white; }
        .btn { background: #ff4500; color: white; padding: 15px 30px; border: none; border-radius: 8px; font-weight: bold; width: 100%; cursor: pointer; margin-top: 20px; font-size: 16px; }
        .btn:hover { background: #ff6347; }
    </style>
</head>
<body>

<header>TF ESPORTS OFFICIAL</header>

<div class="card">
    <h2>Paid Tournament</h2>
    <p>Entry: ₹50 | Prize: ₹500</p>
    <hr style="border: 0.5px solid #333;">
    
    <input type="text" id="pName" placeholder="Player Name (IGN)">
    <input type="text" id="tName" placeholder="Team Name">
    <input type="text" id="uid" placeholder="Free Fire UID">
    <input type="text" id="wa" placeholder="WhatsApp Number">
    
    <button class="btn" onclick="register()">REGISTER NOW</button>
</div>

<script>
    // Tu dilela Firebase Config
    const firebaseConfig = {
        apiKey: "AIzaSyCZBbvexesf4yv2LYGr-H4WxDHcbp8PlkY",
        authDomain: "tf-esports-c337f.firebaseapp.com",
        projectId: "tf-esports-c337f",
        databaseURL: "https://tf-esports-c337f-default-rtdb.firebaseio.com/",
        storageBucket: "tf-esports-c337f.firebasestorage.app",
        messagingSenderId: "1035662946197",
        appId: "1:1035662946197:web:e795103f16a12c80ab509c"
    };

    // Initialize Firebase
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    function register() {
        const pName = document.getElementById('pName').value;
        const tName = document.getElementById('tName').value;
        const uid = document.getElementById('uid').value;
        const wa = document.getElementById('wa').value;

        if(!pName || !tName || !uid || !wa) {
            alert("Arey bhava, sagli mahiti tar bhar!");
            return;
        }

        const ref = database.ref('registrations').push();
        ref.set({
            playerName: pName,
            teamName: tName,
            uid: uid,
            whatsapp: wa,
            time: new Date().toLocaleString()
        }).then(() => {
            alert("Success! Tujhi entry TF ESPORTS kade pochli aahe.");
            location.reload();
        }).catch((e) => {
            alert("Kahitari error aala: " + e.message);
        });
    }
</script>

</body>
</html>
